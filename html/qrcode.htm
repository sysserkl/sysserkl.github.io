<!DOCTYPE html>
<html>
<head>
<title>QR</title>
<meta charset="UTF-8" />
<SCRIPT language=JavaScript src="../hard_ln_io/klbase.js"></SCRIPT>
<script type="text/javascript" src="../hard_ln_io/jquery.js"></script>
<script language="javascript">
klbase_addons_import_js_b(['css','qr'],['jeromeetienne_qrcode.min.js']);
</script>
<script type="text/javascript" src="qrcode.js"></script>
<script language="javascript">
var qr_list_global=[];
var scheme_global={};
scheme_generation_b();
css_root_style_b('18','11',['base','menu']);
</script>
<link rel="shortcut icon" href="qrcode_ico/qrcode512.png" />
<meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport' />
<link rel="manifest" href="qrcode.webmanifest">
</head>
<body>
<h2 style="margin-top:0;font-size:1.3rem;"><span id="span_title">QR Code Generator</span></h2>
<div style="margin:0.5rem;">
<!--history
0.0.3-20210321 增加菜单
0.0.2-20190926
0.0.1-20190924
-->
<p>Strings: <input type="text" id="input_qrtxt" value="just for fun" onkeyup="javascript:if (event.key=='Enter'){create_klqr();}">
<span class="aclick" onclick="javascript:create_klqr();"><b>Generate</b></span> 
</p>
<p>Size: <input type="text" id="input_qrsize" value="280" onkeyup="javascript:if (event.key=='Enter'){create_klqr();}">
F-Color: <input type="text" value="black" id="input_forecolor" onkeyup="javascript:if (event.key=='Enter'){create_klqr();}">
B-Color: <input type="text" value="white" id="input_backcolor" onkeyup="javascript:if (event.key=='Enter'){create_klqr();}">
<span class="aclick" onclick="javascript:randcolor_klqr();">Randomize</span>
<span class="aclick" onclick="javascript:black_white_klqr();">Default</span>
<span class="aclick" onclick="javascript:reverse_klqr();">Reverse</span>
</p>
<div id="div_qrcode" style="padding:0.5rem;margin-top:0.5rem;margin-left:2rem;"></div>
<p><img id="img_from_canvas" src="" alt="" style="padding:0.5rem;margin-top:0.5rem;margin-left:2rem;border:0.1rem black solid;display:none;"></p>
<div id="div_recent_search" style="font-size:0.85rem;margin:0.5rem 0rem;line-height:1.8rem;word-break:break-all;word-wrap:break-word;"></div>
<div id="div_statistics"></div>
</div>
<script type="text/javascript">
//-------------------------
// Register service worker to control making site work offline
if('serviceWorker' in navigator) {
    navigator.serviceWorker
        .register('qrcode_service_worker.js')
        .then(function() { 
            document.getElementById('div_statistics').innerHTML='QRCode Service Worker Registered';
        });
}
else {
    document.getElementById('div_statistics').innerHTML='QRCode Service Worker not work';
}
//-------------------------
init_klqr();
</script>
<script type="text/javascript">
track_source_b('qr',false);
</script>
</body>
</html>
