<html>
<head>
<meta charset="utf-8">

<SCRIPT language=JavaScript src="../hard_ln_io/klbase.js"></SCRIPT>

klbase_addons_import_js_b(['css'],[],['emoji_data.js']);
</script>
<SCRIPT language=JavaScript src="emoji_code.js"></SCRIPT>
<script language="javascript">
//history
//0.0.1-20190928
//-----------------
var mobile_global=ismobile_b(true);
for (let blxl=0;blxl<emoji_global.length;blxl++){
    emoji_global[blxl]=emoji_global[blxl].replace(' => ','<span class="span_no"> => </span>');
}
var scheme_global={};
scheme_generation_b();
css_root_style_b('18','11',['base']);
</script>
<style>
#divhtml {margin:0.5rem 1rem;column-count: 2;}
#divhtml p{font-size:2rem;}
.span_no {font-size:1rem;color:gray;}
</style>
<script language="javascript">
if (mobile_global=='mobile'){
    document.write('\n<style>\ntd {font-size:1.5rem;}\n</style>\n');
}
</script>
<meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport' />
</head>
<body style="margin:0.5rem;">
<h2 style="margin:0.5rem 0rem;font-size:3rem;">🎁️emoji</h2>
<div style="margin:0.5rem 0rem;">
<input type="text" name="input_emoji_search" id="input_emoji_search" value=".*(:r)" placeholder="emoji search" onkeyup="javascript:if (event.key=='Enter'){search_emoji();}" />
</div>
<select id="select_chapter" style="max-width:24rem;height:2rem;" onchange="javascript:minor_options_emoji(this.value);"></select>
<select id="select_sub" style="height:2rem;" onchange="javascript:one_chapter_emoji(this.value);"></select>
<div id="divhtml"></div>
<div id="div_top_bottom"></div>
<script type="text/javascript">

var input_list=[
["input_emoji_search",25],
];

input_size_b(input_list,'name');

main_options_emoji();

var dosomething=false;
var cskeys=href_split_b(location.href);
if (cskeys.length>0 && cskeys[0]!==''){
	for (let item of cskeys){
		var bltmpstr=item.trim();
		if (bltmpstr.substring(0,2)=='s='){
			document.getElementById('input_emoji_search').value=bltmpstr.substring(2);
            search_emoji();
            dosomething=true;
            break;
		}
    }
}
else {
    search_emoji();
}

top_bottom_arrow_b('div_top_bottom','',false,(ismobile_b()?'1.8rem':'1.4rem'));
</script>
<script type="text/javascript">
track_source_b('emoji',false);
</script>
</body>
