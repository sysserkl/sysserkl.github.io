<!DOCTYPE html>
<html>
<head>
<title>图片轮廓点阵生成器</title>
<meta charset="UTF-8">
<script src="../hard_ln_io/klbase.js"></script>
<script>
klbase_addons_import_js_b(['css'],[],[],['img2dots_code.js']);
</script>
<script>
//-----------------------
//history
//0.0.2-20260710
//-----------------------
css_root_style_b('18','13',['base','menu'],[],1);
</script>
</head>
<body>
<h2 style="margin-top:0px;font-size:1.2rem;"><span id="span_title">图片轮廓点阵生成器</span></h2>
<div style="margin:0.5rem;">
<p>
<input type="file" id="image_upload" accept="image/*">
<span class="aclick" onclick="upload_i2d();">Upload</span>
</p>
<p>
灵敏度: <input type="range" id="input_threshold_img_dot" min="0" max="200" value="80" oninput="process_i2d();" onmouseover="this.title=this.value" />
点大小: <input type="range" id="input_dsize_img_dot" min="1" max="10" value="4" oninput="process_i2d();" onmouseover="this.title=this.value" />
间距: <input type="range" id="input_gap_img_dot" min="0" max="10" value="4" oninput="process_i2d();" onmouseover="this.title=this.value" />
背景色：<input type="text" id="input_bgcolor_img_dot" value="black" />
尺寸：<input type="number" id="input_isize_img_dot" value=1200 min=1 step=1 />
</p>
<div><canvas id="canvas_img_dot" style="border: 1px solid #333"></canvas></div>
<div id="divhtml"></div>
<div id="div_status"></div>
</div>
<script>
var original_img_dot_global = new Image();
init_i2d();
</script>
</body>
</html>
